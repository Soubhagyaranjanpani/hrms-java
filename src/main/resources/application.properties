# ===============================
# Server Configuration
# ===============================
server.port=8080
server.servlet.context-path=/hrms

# ===============================
# Swagger Configuration
# ===============================
springdoc.packagesToScan=com.hrms.controller

springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.doc-expansion=none
springdoc.show-actuator=true

# Swagger Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# IMPORTANT: Tell SpringDoc where to find your controllers
springdoc.packages-to-scan=com.hrms

# Server Host Name (for Swagger)
server.host.name=https://hrms.arigen-tech.github.io
spring.application.name=hrms

